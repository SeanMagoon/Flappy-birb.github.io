<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Flappy Bird Canvas Game</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #70c5ce;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    #gameCanvas {
      display: block;
      margin: 20px auto;
      background: linear-gradient(#70c5ce, #ffffff);
      border: 2px solid #000;
    }

    #info {
      color: #222;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <h1>Flappy Birb!</h1>
  <canvas id="gameCanvas" width="480" height="640"></canvas>
  <div id="info">
    Press Space, click, or tap to flap.  
  </div>

  <script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    canvas.setAttribute("tabindex", "0");

    const GRAVITY = 1;
    const FLAP_STRENGTH = -12;
    const PIPE_SPEED = 7;
    const PIPE_GAP = 125;
    const PIPE_WIDTH = 60;
    const BIRD_RADIUS = 15;
    const GROUND_HEIGHT = 80;

    let birdX = 80;
    let birdY = 300;
    let birdVelY = 0;
    let pipes = [];
    let frameCount = 0;
    let score = 0;
    let highScore = 0;
    let gameOver = false;
    let gameStarted = false;
    let waitingForStart = true;

    function flap() {
      if (!gameStarted) {
        gameStarted = true;
        waitingForStart = false;
        birdVelY = FLAP_STRENGTH;
        return;
      }
      if (!gameOver) {
        birdVelY = FLAP_STRENGTH;
      } else {
        resetGame();
        waitingForStart = true;
        gameStarted = false;
      }
    }

    window.addEventListener("keydown", (e) => {
      if (e.code === "Space") {
        e.preventDefault();
        flap();
      }
    });

    canvas.addEventListener("mousedown", (e) => {
      e.preventDefault();
      flap();
    });

    canvas.addEventListener("touchstart", (e) => {
      e.preventDefault();
      flap();
    }, { passive: false });

    canvas.addEventListener("click", () => canvas.focus());

    function resetGame() {
      birdX = 80;
      birdY = 300;
      birdVelY = 0;
      pipes = [];
      frameCount = 0;
      score = 0;
      gameOver = false;
    }

    function addPipe() {
      const minTop = 60;
      const maxTop = 600 - PIPE_GAP - GROUND_HEIGHT - 60;
      const topHeight = Math.floor(Math.random() * (maxTop - minTop)) + minTop;
      pipes.push({ x: canvas.width, topHeight: topHeight, scored: false });
    }

    function circleRectCollision(cx, cy, r, rx, ry, rw, rh) {
      const closestX = Math.max(rx, Math.min(cx, rx + rw));
      const closestY = Math.max(ry, Math.min(cy, ry + rh));
      const dx = cx - closestX;
      const dy = cy - closestY;
      return dx * dx + dy * dy < r * r;
    }

    function update() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawBackground();

      if (gameStarted && !gameOver) {
        frameCount++;
        birdVelY += GRAVITY;
        birdY += birdVelY;

        if (frameCount % 45 === 0) addPipe();

        for (let i = 0; i < pipes.length; i++) {
          pipes[i].x -= PIPE_SPEED;
        }

        pipes = pipes.filter(p => p.x + PIPE_WIDTH > 0);

        if (birdY + BIRD_RADIUS > canvas.height - GROUND_HEIGHT || birdY - BIRD_RADIUS < 0) {
          gameOver = true;
          if (score > highScore) highScore = score;
        }

        for (let i = 0; i < pipes.length; i++) {
          const p = pipes[i];
          const topRect = { x: p.x, y: 0, w: PIPE_WIDTH, h: p.topHeight };
          const bottomRect = {
            x: p.x,
            y: p.topHeight + PIPE_GAP,
            w: PIPE_WIDTH,
            h: canvas.height - GROUND_HEIGHT - (p.topHeight + PIPE_GAP)
          };

          if (
            circleRectCollision(birdX, birdY, BIRD_RADIUS, topRect.x, topRect.y, topRect.w, topRect.h) ||
            circleRectCollision(birdX, birdY, BIRD_RADIUS, bottomRect.x, bottomRect.y, bottomRect.w, bottomRect.h)
          ) {
            gameOver = true;
            if (score > highScore) highScore = score;
          }

          if (!gameOver && !p.scored && birdX > p.x + PIPE_WIDTH / 2) {
            p.scored = true;
            score++;
          }
        }
      }

      drawPipes();
      drawBird();
      drawScore();
      drawGameOver();
      drawStartMessage();
      requestAnimationFrame(update);
    }

    function drawBackground() {
      const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
      gradient.addColorStop(0, "#87CEEB");
      gradient.addColorStop(1, "#E0F6FF");
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.strokeStyle = "rgba(255, 255, 255, 0.3)";
      ctx.lineWidth = 2;
      ctx.lineCap = "round";
      for (let i = 0; i < 8; i++) {
        const windX = (frameCount * 1.5 + i * 80) % (canvas.width + 100) - 50;
        const windY = 100 + i * 35 + Math.sin(frameCount * 0.08 + i) * 20;
        ctx.beginPath();
        ctx.moveTo(windX, windY);
        ctx.lineTo(windX + 60, windY);
        ctx.lineTo(windX + 45, windY - 8);
        ctx.lineTo(windX + 30, windY + 5);
        ctx.stroke();
      }

      ctx.fillStyle = "#fff";
      for (let i = 0; i < 3; i++) {
        ctx.save();
        ctx.translate((frameCount * 0.3 + i * 120) % (canvas.width + 100) - 50, 80 + i * 40);
        ctx.beginPath();
        ctx.arc(0, 0, 25, 0, Math.PI * 2);
        ctx.arc(30, 0, 35, 0, Math.PI * 2);
        ctx.arc(60, 10, 28, 0, Math.PI * 2);
        ctx.arc(15, -15, 20, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      ctx.fillStyle = "#2c3e50";
      for (let i = 0; i < 8; i++) {
        const buildingWidth = 35 + (i % 3) * 15;
        const buildingHeight = 100 + i * 20;
        const x = i * 55;
        ctx.fillRect(x, canvas.height - GROUND_HEIGHT - buildingHeight, buildingWidth, buildingHeight);

        ctx.fillStyle = "#34495e";
        for (let j = 0; j < 5; j++) {
          ctx.fillRect(x + 8, canvas.height - GROUND_HEIGHT - buildingHeight + 25 + j * 28, 10, 15);
          ctx.fillRect(x + buildingWidth - 18, canvas.height - GROUND_HEIGHT - buildingHeight + 25 + j * 28, 10, 15);
        }
        ctx.fillStyle = "#2c3e50";
      }

      ctx.fillStyle = "#8B4513";
      ctx.fillRect(0, canvas.height - GROUND_HEIGHT, canvas.width, GROUND_HEIGHT);

      ctx.fillStyle = "#228B22";
      for (let i = 0; i < canvas.width; i += 6) {
        const grassHeight = 12 + Math.sin(frameCount * 0.1 + i * 0.05) * 4;
        ctx.fillRect(i, canvas.height - GROUND_HEIGHT - 12, 3, grassHeight);
      }
    }

    function drawBird() {
      ctx.save();
      ctx.translate(birdX, birdY);
      const flapAngle = Math.sin(frameCount * 0.3 + (birdVelY < -3 ? 2 : 0)) * 0.8;

      ctx.fillStyle = "#ffeb3b";
      ctx.beginPath();
      ctx.arc(0, 0, BIRD_RADIUS, 0, Math.PI * 2);
      ctx.fill();

      ctx.save();
      ctx.translate(-3, 3);
      ctx.rotate(flapAngle);
      ctx.fillStyle = "#f4d742";
      ctx.beginPath();
      ctx.ellipse(0, 0, BIRD_RADIUS * 1.4, BIRD_RADIUS * 0.7, -0.3, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();

      ctx.fillStyle = "#000";
      ctx.beginPath();
      ctx.arc(6, -6, 3, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "#ff9800";
      ctx.beginPath();
      ctx.moveTo(BIRD_RADIUS, 0);
      ctx.lineTo(BIRD_RADIUS + 12, -4);
      ctx.lineTo(BIRD_RADIUS + 12, 4);
      ctx.closePath();
      ctx.fill();

      ctx.restore();
    }

    function drawPipes() {
      ctx.fillStyle = "#4caf50";
      for (let i = 0; i < pipes.length; i++) {
        const p = pipes[i];
        ctx.fillRect(p.x, 0, PIPE_WIDTH, p.topHeight);
        const bottomY = p.topHeight + PIPE_GAP;
        ctx.fillRect(p.x, bottomY, PIPE_WIDTH, canvas.height - GROUND_HEIGHT - bottomY);
      }
    }

    function drawScore() {
      ctx.fillStyle = "#000";
      ctx.font = "30px Arial";
      ctx.textAlign = "center";
      ctx.fillText(score, canvas.width / 2, 45);
      ctx.textAlign = "left";
      ctx.font = "18px Arial";
      ctx.fillText("Best: " + highScore, 15, 30);
    }

    function drawGameOver() {
      if (!gameOver) return;
      ctx.fillStyle = "rgba(0,0,0,0.7)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#fff";
      ctx.font = "40px Arial";
      ctx.textAlign = "center";
      ctx.fillText("Game Over", canvas.width / 2, canvas.height / 2 - 20);
      ctx.font = "20px Arial";
      ctx.fillText("Click or Space to restart", canvas.width / 2, canvas.height / 2 + 20);
      ctx.textAlign = "left";
    }

    function drawStartMessage() {
      if (!gameStarted && !gameOver) {
        ctx.fillStyle = "rgba(0,0,0,0.7)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#fff";
        ctx.font = "32px Arial";
        ctx.textAlign = "center";
        ctx.fillText("Click or Space to start", canvas.width / 2, canvas.height / 2);
        ctx.textAlign = "left";
      }
    }

    update();
  </script>
</body>
</html>
